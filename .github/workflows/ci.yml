name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile orchestrator.py
          python -m py_compile core/llm.py
          python -m py_compile agents/diagnostico.py
          python -m py_compile agents/qualificador.py
          python -m py_compile agents/analise_call.py
          python -m py_compile agents/orcamento.py
          python -m py_compile agents/simulador.py
          echo "Todos os modulos OK"

      - name: Unit tests
        run: |
          python -c "
          from agents.simulador import listar_objecoes
          objecoes = listar_objecoes()
          assert len(objecoes) > 0, 'lista de objecoes vazia'
          print(f'simulador.listar_objecoes: {len(objecoes)} objecoes OK')

          from agents import diagnostico, qualificador, analise_call, orcamento, simulador
          print('Todos os agentes importados com sucesso')
          "
